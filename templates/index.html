<!-- movie_project/templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Streamer</title>
    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/8.6.1/video-js.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        h1, h2 { color: #ffffff; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .movie-card { background-color: #1e1e1e; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
        .movie-card:hover { transform: scale(1.05); }
        .movie-card img { width: 100%; height: 300px; object-fit: cover; }
        .movie-card h3 { padding: 10px; font-size: 1rem; margin: 0; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.8); }
        .modal-content { background-color: #1e1e1e; margin: 5% auto; padding: 20px; border: 1px solid #444; width: 90%; max-width: 900px; }
        .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close:hover { color: white; }
        .video-wrapper { margin-top: 20px; }
        #status { margin-top: 10px; color: #f0f0f0; }
    </style>
</head>
<body>

<div class="container">
    <h1>My Movie Aggregator</h1>
    <button onclick="refreshMovies()">Refresh All Movies</button>
    <p id="status"></p>
    <hr>
    <div id="movie-list" class="movie-grid"></div>
</div>

<!-- The Modal for watching a movie -->
<div id="watchModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2 id="modal-title"></h2>
    <p id="modal-synopsis"></p>
    <div class="video-wrapper">
        <video id="my-player" class="video-js vjs-default-skin" controls preload="auto" width="100%" height="400" data-setup='{"fluid": true}'>
            <p class="vjs-no-js">To view this video please enable JavaScript, and consider upgrading to a web browser that supports HTML5 video.</p>
        </video>
    </div>
    <h3>Other Servers:</h3>
    <ul id="server-list"></ul>
  </div>
</div>

<!-- Video.js JavaScript -->
<script src="https://vjs.zencdn.net/8.6.1/video.min.js"></script>

<script>
    const API_BASE = '/api';
    const movieList = document.getElementById('movie-list');
    const modal = document.getElementById('watchModal');
    const modalTitle = document.getElementById('modal-title');
    const modalSynopsis = document.getElementById('modal-synopsis');
    const serverList = document.getElementById('server-list');
    const statusEl = document.getElementById('status');
    const player = videojs('my-player');

    // Get CSRF token from cookie
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    // Modal controls
    const span = document.getElementsByClassName("close")[0];
    span.onclick = () => { modal.style.display = "none"; player.pause(); }
    window.onclick = (event) => { if (event.target == modal) { modal.style.display = "none"; player.pause(); } }

    async function fetchMovies() {
        try {
            statusEl.textContent = 'Fetching movies...';
            const response = await fetch(`${API_BASE}/movies/`);
            const movies = await response.json();
            statusEl.textContent = `Found ${movies.length} movies.`;
            displayMovies(movies);
        } catch (error) {
            statusEl.textContent = 'Error fetching movies.';
            console.error('Error:', error);
        }
    }

    function displayMovies(movies) {
        movieList.innerHTML = '';
        if (movies.length === 0) {
            movieList.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">No movies found. Click "Refresh All Movies" to start scraping.</p>';
            return;
        }
        movies.forEach(movie => {
            if (!movie.poster_url) return;
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `
                <img src="${movie.poster_url}" alt="${movie.title}">
                <h3>${movie.title} (${movie.year || 'N/A'})</h3>
            `;
            card.onclick = () => openWatchModal(movie);
            movieList.appendChild(card);
        });
    }

    async function openWatchModal(movie) {
        modalTitle.textContent = `${movie.title} (${movie.year})`;
        modalSynopsis.textContent = movie.synopsis || 'No synopsis available.';
        serverList.innerHTML = '';

        try {
            const response = await fetch(`${API_BASE}/watch/${movie.imdb_id}/`);
            const movieData = await response.json();
            const links = movieData.links.filter(link => link.is_active);

            if (links.length > 0) {
                const firstLink = links[0];
                setupPlayer(firstLink.stream_url);
                
                links.forEach(link => {
                    const li = document.createElement('li');
                    li.innerHTML = `<a href="#" onclick="setupPlayer('${link.stream_url}'); return false;">${link.quality} (${link.language})</a>`;
                    serverList.appendChild(li);
                });
            } else {
                player.src({});
                serverList.innerHTML = '<li>No active streaming links found. Try refreshing.</li>';
            }
        } catch (error) {
            console.error('Error fetching movie details:', error);
            serverList.innerHTML = '<li>Could not load streaming links.</li>';
        }
        modal.style.display = "block";
    }

    function setupPlayer(streamUrl) {
        let type = 'video/mp4';
        if (streamUrl.includes('.m3u8')) {
            type = 'application/x-mpegURL';
        }

        player.src({
            src: streamUrl,
            type: type
        });
        player.ready(() => {
            player.play();
        });
    }

    async function refreshMovies() {
        statusEl.textContent = 'Triggering a full refresh... This may take a few minutes.';
        try {
            const csrftoken = getCookie('csrftoken');
            const response = await fetch(`${API_BASE}/movies/refresh/`, { 
                method: 'POST',
                headers: {
                    'X-CSRFToken': csrftoken,
                    'Content-Type': 'application/json'
                }
            });
            
            if (response.ok) {
                statusEl.textContent = 'Refresh started! Reload the page in a few minutes to see new movies.';
                setTimeout(fetchMovies, 120000);
            } else {
                const error = await response.json();
                statusEl.textContent = `Error: ${error.detail || 'Failed to start refresh'}`;
            }
        } catch (error) {
            statusEl.textContent = 'Error triggering refresh.';
            console.error('Error:', error);
        }
    }

    fetchMovies();
</script>
</body>
</html>
